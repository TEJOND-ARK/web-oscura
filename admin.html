<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel TejónDark - Web Anónima</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="js/firebase.js"></script>
    <script src="js/app.js"></script>
</head>
<body style="background-color: #f5f5f5; min-height: 100vh;">

    <nav class="navbar is-dark">
        <div class="navbar-brand">
            <div class="navbar-item"><h1 class="title is-4 has-text-danger-light">🦡 Panel TejónDark</h1></div>
        </div>
        <div class="navbar-end">
            <div class="navbar-item">
                <button class="button is-danger is-small" onclick="cerrarSesionAdmin()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <main class="section">
        <div class="container">
            <div class="box notification is-black">
                <h2 class="title is-3">Bienvenido, Administrador Global</h2>
                <p class="subtitle is-5">Control total del Marketplace de la Web Anónima.</p>
            </div>
            <div class="columns is-multiline mt-4">
                <div class="column is-4">
                    <div class="box" style="border-top: 4px solid #3273dc;">
                        <p class="title is-4">Usuarios</p>
                        <button class="button is-info is-small is-light is-fullwidth">Gestionar Usuarios</button>
                    </div>
                </div>
                <div class="column is-4">
                    <div class="box" style="border-top: 4px solid #ffdd57;">
                        <p class="title is-4">Productos</p>
                        <button class="button is-warning is-small is-light is-fullwidth">Ver Catálogo</button>
                    </div>
                </div>
                <div class="column is-4">
                    <div class="box" style="border-top: 4px solid #f14668;">
                        <p class="title is-4">Reportes</p>
                        <button class="button is-danger is-small is-light is-fullwidth">Ver Alertas</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function cerrarSesionAdmin() {
            firebase.auth().signOut().then(() => { 
                window.location.href = "index.html"; 
            });
        }
    </script>
</body>
</html>
