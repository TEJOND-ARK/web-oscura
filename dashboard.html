<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Cliente - Web Anónima</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <script src="./js/firebase.js"></script>
    <script src="./js/app.js"></script>
</head>
<body class="has-background-black-ter" style="min-height: 100vh; color: #fff;">

    <nav class="navbar is-black">
        <div class="navbar-brand">
            <a class="navbar-item" href="index.html">
                <strong class="has-text-danger is-size-4">🥷 Web Anónima</strong>
            </a>
        </div>
        <div class="navbar-end">
            <div class="navbar-item">
                <button class="button is-danger is-small" onclick="cerrarSesionCliente()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <main class="section">
        <div class="container has-text-centered mt-6">
            <div class="box has-background-dark has-text-white" style="border: 1px solid #ff3860;">
                <h1 class="title is-2 has-text-danger">¡Bienvenido a tu Panel de Cliente!</h1>
                <p class="subtitle is-5 mt-2">Desde aquí podrás realizar el seguimiento de tus órdenes de compra encriptadas de forma segura.</p>
                <div class="tags is-centered mt-4">
                    <span class="tag is-success is-medium">Conexión Segura SSL</span>
                    <span class="tag is-info is-medium">ID de Sesión Activo</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        function cerrarSesionCliente() {
            firebase.auth().signOut().then(() => { 
                window.location.href = "index.html"; 
            });
        }
    </script>
</body>
</html>
