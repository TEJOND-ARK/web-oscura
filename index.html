<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Web Anónima</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/firebase.js"></script>
</head>
<body>
    <nav class="navbar is-danger">
        <div class="navbar-brand">
            <span class="navbar-item title is-5 has-text-white" style="margin-bottom: 0;">🕵️‍♂️ Panel TejónDark</span>
        </div>
        <div class="navbar-end">
            <div class="navbar-item">
                <button class="button is-white is-outlined" onclick="cerrarSesionAdmin()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <h1 class="title">Bienvenido, Administrador Global</h1>
            <p class="subtitle">Control total del Marketplace de la Web Anónima.</p>
            
            <div class="columns is-multiline mt-5">
                <div class="column is-4">
                    <div class="box notification is-info is-light">
                        <p class="title is-4">Usuarios</p>
                        <p class="subtitle is-6">Ver y banear cuentas registradas</p>
                    </div>
                </div>
                <div class="column is-4">
                    <div class="box notification is-warning is-light">
                        <p class="title is-4">Productos</p>
                        <p class="subtitle is-6">Moderar publicaciones del mercado</p>
                    </div>
                </div>
                <div class="column is-4">
                    <div class="box notification is-danger is-light">
                        <p class="title is-4">Reportes</p>
                        <p class="subtitle is-6">Revisar alertas de usuarios</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Función para salir de la cuenta de admin y volver al inicio
        function cerrarSesionAdmin() {
            firebase.auth().signOut().then(() => {
                window.location.href = "index.html";
            }).catch((error) => {
                console.error("Error al cerrar sesión:", error);
            });
        }
    </script>
</body>
</html>
