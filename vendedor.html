<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Vendedor - Web Anónima</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="./js/firebase.js"></script>
    <script src="./js/app.js"></script>
    <style>
        .badge-notif {
            position: absolute; top: -5px; right: -5px;
            background-color: #ff3860; color: white;
            border-radius: 50%; padding: 2px 7px;
            font-size: 0.7rem; font-weight: bold;
        }
    </style>
</head>
<body class="has-background-black-ter" style="min-height: 100vh; color: #fff;">

    <nav class="navbar is-dark">
        <div class="navbar-brand">
            <div class="navbar-item"><h1 class="title is-4 has-text-warning">💰 Panel de Vendedor</h1></div>
        </div>
        <div class="navbar-end is-flex is-align-items-center pr-4">
            <div class="navbar-item" style="position: relative; cursor: pointer; margin-right: 15px;" onclick="abrirModalNotif()">
                <span class="icon is-medium has-text-white">
                    <i class="fas fa-bell fa-lg"></i>
                </span>
                <span id="contador-notif" class="badge-notif" style="display: none;">0</span>
            </div>
            <div class="navbar-item">
                <button class="button is-danger is-small" onclick="firebase.auth().signOut()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <main class="section">
        <div class="container">
            <div class="box notification is-warning is-light">
                <h2 class="title is-3">Sección de Despacho y Ventas</h2>
                <p class="subtitle is-5">Publica tus herramientas informáticas o servicios de red en <strong>Soles Peruanos (S/.)</strong>.</p>
            </div>
            
            <div class="columns is-desktop">
                <div class="column is-5-desktop">
                    <div class="box has-background-dark has-text-white" style="border: 1px solid #ffdd57;">
                        <h3 class="title is-4 has-text-warning mb-4"><i class="fas fa-plus-circle"></i> Publicar Nuevo Producto</h3>
                        
                        <div class="field">
                            <label class="label has-text-white">Nombre del Servicio / Ítem</label>
                            <input id="prod-nombre" class="input is-warning has-background-black has-text-white" type="text" placeholder="Ej. Acceso VPN Offshore Dedicado">
                        </div>

                        <div class="field">
                            <label class="label has-text-white">Precio (S/.)</label>
                            <div class="control has-icons-left">
                                <input id="prod-precio" class="input is-warning has-background-black has-text-white" type="number" placeholder="Ej. 25">
                                <span class="icon is-small is-left has-text-warning"><strong style="line-height:2.4;">S/.</strong></span>
                            </div>
                        </div>

                        <div class="field">
                            <label class="label has-text-white">Subir Foto (Desde almacenamiento)</label>
                            <div class="file is-warning has-name is-fullwidth">
                                <label class="file-label">
                                    <input id="prod-foto-local" class="file-input" type="file" accept="image/*" onchange="convertirFotoABase64(this)">
                                    <span class="file-cta" style="background: #111; color: #ffdd57;">
                                        <span class="file-icon"><i class="fas fa-image"></i></span>
                                        <span class="file-label">Seleccionar Foto...</span>
                                    </span>
                                    <span id="nombre-foto-visual" class="file-name has-background-black has-text-white">Ninguna foto</span>
                                </label>
                            </div>
                        </div>

                        <div class="field">
                            <label class="label has-text-white">Descripción Detallada</label>
                            <textarea id="prod-descripcion" class="textarea is-warning has-background-black has-text-white" rows="3" placeholder="para sus narices en 4k"></textarea>
                        </div>

                        <button id="btn-subir" class="button is-warning is-fullwidth mt-4" onclick="publicarOferta()"><strong>Publicar Oferta</strong></button>
                    </div>
                </div>

                <div class="column is-7-desktop">
                    <div class="box has-background-black-bis has-text-white" style="border: 1px solid #555;">
                        <h3 class="title is-4 has-text-white mb-4"><i class="fas fa-list-ul has-text-warning"></i> Mis Productos en la Tienda</h3>
                        <div id="lista-mis-productos"><p class="has-text-grey">Cargando...</p></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-notif" class="modal">
        <div class="modal-background" onclick="cerrarModalNotif()"></div>
        <div class="modal-content" style="padding: 15px;">
            <div class="box has-background-dark has-text-white" style="border: 2px solid #48c78e;">
                <h3 class="title is-4 has-text-success"><i class="fas fa-wallet"></i> Avisos de Liberación (Escrow)</h3>
                <hr style="background-color: #444;">
                <div id="cuerpo-notificaciones">
                    <p class="has-text-grey">No hay avisos de pago del administrador todavía.</p>
                </div>
                <button class="button is-small is-light mt-3" onclick="cerrarModalNotif()">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        let vUid = "";
        let imagenBinaria = "https://bulma.io/images/placeholders/1280x960.png";

        firebase.auth().onAuthStateChanged((user) => {
            if (user) { vUid = user.uid; cargarMisProductos(); escucharAlertasAdmin(); }
        });

        // Transforma la foto local de la PC/Celular a un formato almacenable directamente
        function convertirFotoABase64(elemento) {
            if(elemento.files && elemento.files[0]) {
                const archivo = elemento.files[0];
                document.getElementById('nombre-foto-visual').innerText = archivo.name;
                const lector = new FileReader();
                lector.onload = (e) => { imagenBinaria = e.target.result; };
                lector.readAsDataURL(archivo);
            }
        }

        function publicarOferta() {
            const nom = document.getElementById('prod-nombre').value.trim();
            const pre = parseFloat(document.getElementById('prod-precio').value);
            const des = document.getElementById('prod-descripcion').value.trim();
            if(!nom || isNaN(pre) || !des) { alert("Llena todos los campos."); return; }

            document.getElementById('btn-subir').classList.add('is-loading');

            firebase.firestore().collection("productos").add({
                nombre: nom, precio: pre, descripcion: des, imagen: imagenBinaria,
                vendedorId: vUid, fechaCreacion: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert("¡Publicado en la base de datos!");
                location.reload();
            }).catch(e => { alert("Error: "+e.message); document.getElementById('btn-subir').classList.remove('is-loading'); });
        }

        function cargarMisProductos() {
            const contenedor = document.getElementById('lista-mis-productos');
            firebase.firestore().collection("productos").where("vendedorId", "==", vUid).get().then(snap => {
                contenedor.innerHTML = snap.empty ? `<p class="has-text-grey">Sin publicaciones.</p>` : "";
                snap.forEach(doc => {
                    const d = doc.data();
                    contenedor.innerHTML += `
                        <div class="box has-background-dark mb-2">
                            <div class="media">
                                <div class="media-left"><figure class="image is-64x64"><img src="${d.imagen}" style="object-fit:cover; height:100%; border-radius:4px;"></figure></div>
                                <div class="media-content">
                                    <p class="title is-5 has-text-warning mb-0">${d.nombre}</p>
                                    <p class="subtitle is-6 has-text-success mb-1">S/. ${d.precio}</p>
                                    <p class="is-size-7 text-grey-light">${d.descripcion}</p>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        // Escucha en tiempo real los mensajes que TU le envías desde tu admin.html
        function escucharAlertasAdmin() {
            firebase.firestore().collection("notificaciones_vendedor")
                .where("vendedorId", "==", vUid)
                .orderBy("fecha", "desc")
                .onSnapshot(snap => {
                    const cont = document.getElementById('contador-notif');
                    const lista = document.getElementById('cuerpo-notificaciones');
                    if(!snap.empty) {
                        cont.innerText = snap.size; cont.style.display = "block";
                        lista.innerHTML = "";
                        snap.forEach(doc => {
                            const n = doc.data();
                            lista.innerHTML += `
                                <div class="notification is-success is-light mb-2" style="border-left: 5px solid #48c78e">
                                    <p class="is-size-7 has-text-grey">📅 ${n.fecha ? n.fecha.toDate().toLocaleString() : 'Reciente'}</p>
                                    <p class="is-size-5"><strong>${n.mensaje}</strong></p>
                                </div>`;
                        });
                    }
                });
        }

        function abrirModalNotif() { document.getElementById('modal-notif').classList.add('is-active'); }
        function cerrarModalNotif() { document.getElementById('modal-notif').classList.remove('is-active'); }
    </script>
</body>
</html>
